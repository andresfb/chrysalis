version: '3.5'

services:
  nginx:
    image: nginx:stable-alpine
    container_name: nginx
    ports:
      - "80:80"
    volumes:
      - ./config/nginx/app.conf:/etc/nginx/conf.d/default.conf
      - ./src:/var/www
    depends_on:
      - php
      - mysql
    networks:
      - app-network

  mysql:
    image: mysql:5.7
    container_name: mysql
    restart: unless-stopped
    tty: true
    env_file:
      - .env
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      TZ: ${TIME_ZONE}
      SERVICE_TAGS: dev
      SERVICE_NAME: mysql
    ports:
      - "${MYSQL_PORT}:3306"
    volumes:
      - dbdata:/var/lib/mysql/
      - ./config/mysql/my.cnf:/etc/mysql/my.cnf
    networks:
      - app-network

  redis:
    image: redis:alpine
    container_name: redis
    env_file:
      - .env
    ports:
      - "${REDIS_PORT}:6379"
    volumes:
      - redisdata:/data
    networks:
      - app-network

  php:
    build:
      context: .
      dockerfile: config/docker/app.dockerfile
    container_name: php
    volumes:
      - ./src:/var/www
      - ./config/php/local.ini:/usr/local/etc/php/conf.d/local.ini
    user: 1000:1000
    ports:
      - "9000:9000"
    networks:
      - app-network

  artisan:
    build:
      context: .
      dockerfile: config/docker/tools.dockerfile
    container_name: artisan
    user: 1000:1000
    volumes:
      - ./src:/var/www
    depends_on:
      - mysql
    working_dir: /var/www
    entrypoint: ['/var/www/artisan']
    networks:
      - app-network

  composer:
    image: composer:latest
    container_name: composer
    volumes:
      - ./src:/var/www
    working_dir: /var/www
    depends_on:
      - php
    networks:
      - app-network

  horizon:
    build:
      context: .
      dockerfile: config/docker/tools.dockerfile
    container_name: horizon
    user: 1000:1000
    volumes:
      - ./src:/var/www
    working_dir: /var/www
    entrypoint: ['/var/www/artisan']
    networks:
      - app-network

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: phpmyadmin
    env_file:
      - .env
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      PMA_HOST: mysql
      PMA_PORT: 3306
    restart: always
    ports:
      - "8080:80"
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  dbdata:
    driver: local
  redisdata:
    driver: local